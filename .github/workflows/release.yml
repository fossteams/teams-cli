name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="snapshot-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build archives and checksums
        run: ./scripts/build-release-artifacts.sh "${{ steps.version.outputs.value }}"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.value }}
          path: |
            dist/*.tar.gz
            dist/*_checksums.txt

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*_checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(steps.version.outputs.value, '-') }}
