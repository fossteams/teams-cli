name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="snapshot-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build archives and checksums
        run: ./scripts/build-release-artifacts.sh "${{ steps.version.outputs.value }}"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ steps.version.outputs.value }}
          path: |
            dist/*.tar.gz
            dist/*_checksums.txt

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_VERSION}" \
              dist/*.tar.gz \
              dist/*_checksums.txt \
              --clobber
          else
            gh release create "${RELEASE_VERSION}" \
              dist/*.tar.gz \
              dist/*_checksums.txt \
              --generate-notes \
              --verify-tag \
              $(if [[ "${RELEASE_VERSION}" == *-* ]]; then echo --prerelease; fi)
          fi
